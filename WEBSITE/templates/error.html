<!-- templates/error.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Dynamically set title based on theme stored in localStorage or default to 'light' -->
    <title>404 - Page Not Found</title>

    <!-- Load fonts and CSS (ensure these paths match your project structure) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

    <!-- Minimal CSS for error page -->
    <style>
        body {
            font-family: 'Inter', sans-serif; text-align: center; padding-top: 50px;
            background-color: var(--bg-color); color: var(--text-main);
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3rem); color: var(--accent); }

        p { color: var(--text-muted); max-width: 400px; margin: 0 auto 2rem auto; line-height: 1.5; }

        a {
            display: inline-block; text-decoration: none; background-color: var(--accent); color: var(--bg-color);
            padding: 10px 30px; border-radius: 4px; font-weight: 600; transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        a:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(140, 158, 122, 0.3); }
    </style>
</head>
<body>
    <div class="hero-content">
        <!-- The Parallax Effect is handled by a simple JS snippet below to avoid full page reload overhead -->
        <h1 style="animation: fadeInDown 1s ease;">404 - Not Found</h1>

        <p>The page you requested does not exist.</p>

        <a href="/">Return Home</a>
    </div>

    <!-- Simple JS to mimic the parallax effect if background image is used, or just a clean fade -->
    <script>
        // Optional: Add subtle parallax feel to error page if you add an image later
        const errorBody = document.body;
        window.addEventListener('scroll', () => {
            let scrollPosition = window.scrollY || document.documentElement.scrollTop;
            errorBody.style.transform = 'translateY(-' + (scrollPosition * 0.5) + 'px)';
        });
    </script>
</body>
</html>
